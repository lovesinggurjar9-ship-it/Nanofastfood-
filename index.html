<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neno Fast Food</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#000;
position:sticky;
top:0;
z-index:1000;
}

.logo{
color:#ffcc00;
font-size:20px;
font-weight:bold;
}

/* SEARCH */
.search{
text-align:center;
padding:10px;
}

.search input{
padding:10px;
width:80%;
border-radius:20px;
border:none;
outline:none;
}

/* CATEGORY */
.categories{
display:flex;
gap:10px;
padding:10px;
justify-content:center;
flex-wrap:wrap;
}

.cat-btn{
background:#111;
color:#fff;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
border:1px solid #333;
}

.cat-btn:hover{
background:#ffcc00;
color:#000;
}

/* MENU */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
height:120px;
object-fit:cover;
}

.price{
color:#ffcc00;
font-size:18px;
margin:10px 0;
}

/* BUTTONS */
button{
background:#ffcc00;
border:none;
padding:6px 10px;
margin:3px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.remove{
background:red;
color:#fff;
}

/* CART */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ffcc00;
color:#000;
padding:12px 15px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
z-index:2000;
}

.cart{
position:fixed;
right:20px;
bottom:80px;
width:300px;
background:#000;
border:1px solid #333;
padding:15px;
border-radius:10px;
display:none;
}

.small{
font-size:12px;
color:#aaa;
}

input{
padding:8px;
width:90%;
margin:5px 0;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<header>
<div class="logo">🍔 Neno Fast Food</div>
</header>

<!-- SEARCH -->
<div class="search">
<input type="text" id="searchBox" placeholder="Search food..." onkeyup="searchFood()">
</div>

<!-- CATEGORY -->
<div class="categories">
<div class="cat-btn" onclick="filter('all')">All</div>
<div class="cat-btn" onclick="filter('burger')">Burger</div>
<div class="cat-btn" onclick="filter('pizza')">Pizza</div>
<div class="cat-btn" onclick="filter('fries')">Fries</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">

<div class="card" data-cat="burger">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<h3>Burger</h3>
<p class="price">$1.07</p>
<button onclick="add('Burger',1.07)">Add</button>
</div>

<div class="card" data-cat="pizza">
<img src="https://images.unsplash.com/photo-1601924582970-9238bcb495d9">
<h3>Pizza</h3>
<p class="price">$1.79</p>
<button onclick="add('Pizza',1.79)">Add</button>
</div>

<div class="card" data-cat="fries">
<img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877">
<h3>Fries</h3>
<p class="price">$0.83</p>
<button onclick="add('Fries',0.83)">Add</button>
</div>

</div>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
</div>

<!-- CART -->
<div class="cart" id="cartBox">
<h3>Your Order</h3>
<div id="items"></div>

<input type="text" id="coupon" placeholder="Coupon code (SAVE10)">

<p>Total: $<span id="total">0</span></p>
<p>Final: $<span id="final">0</span></p>

<button onclick="applyCoupon()">Apply Coupon</button>
<button onclick="order()">Place Order</button>

<p class="small">Delivery: $1 fixed</p>
</div>

<script>

let cart = [];
let discount = 0;
let delivery = 1;

function add(name,price){

let item = cart.find(i=>i.name===name);

if(item){
item.qty++;
}else{
cart.push({name,price,qty:1});
}

update();
}

function removeItem(name){
cart = cart.filter(i=>i.name!==name);
update();
}

function update(){

let items = document.getElementById("items");
let total = 0;
let count = 0;

items.innerHTML = "";

cart.forEach(i=>{
total += i.price*i.qty;
count += i.qty;

items.innerHTML += `
<p>
${i.name} x ${i.qty}
<button class="remove" onclick="removeItem('${i.name}')">X</button>
</p>`;
});

let final = total + delivery - discount;

document.getElementById("total").innerText = total.toFixed(2);
document.getElementById("final").innerText = final.toFixed(2);
document.getElementById("count").innerText = count;
}

function toggleCart(){
let box = document.getElementById("cartBox");
box.style.display = box.style.display==="block"?"none":"block";
}

function applyCoupon(){
let code = document.getElementById("coupon").value;

if(code==="SAVE10"){
discount = 1;
alert("Coupon Applied!");
}else{
alert("Invalid Coupon");
}

update
