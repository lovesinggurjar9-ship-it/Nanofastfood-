<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neno Fast Food Pro</title>

<link rel="icon" href="logo.png">

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

/* HEADER */
header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#000;
border-bottom:1px solid #222;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
color:#ffcc00;
font-weight:bold;
font-size:20px;
}

.logo img{height:45px}

nav a{
margin:0 10px;
color:#fff;
font-weight:bold;
text-decoration:none;
}

nav a:hover{color:#ffcc00}

/* HERO */
.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("images/banner.jpg");
background-size:cover;
}

.hero h1{
font-size:40px;
color:#ffcc00;
}

.hero p{color:#ddd}

/* MENU GRID */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#151515;
border-radius:15px;
overflow:hidden;
border:1px solid #2a2a2a;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
border-color:#ffcc00;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{padding:10px;margin:0}
.card p{padding:0 10px;color:#aaa}

.price{
padding:10px;
color:#ffcc00;
font-weight:bold;
}

.card button{
width:100%;
padding:10px;
background:#ffcc00;
border:none;
font-weight:bold;
cursor:pointer;
}

/* CART BUTTON */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ffcc00;
color:#000;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

/* CART DRAWER */
.cart{
position:fixed;
top:0;
right:-350px;
width:300px;
height:100%;
background:#111;
border-left:1px solid #333;
padding:15px;
transition:0.3s;
z-index:2000;
}

.cart.open{
right:0;
}

.cart h2{
color:#ffcc00;
}

.item{
display:flex;
justify-content:space-between;
margin:10px 0;
border-bottom:1px solid #222;
padding-bottom:5px;
}

.close{
background:red;
color:#fff;
border:none;
padding:5px 8px;
cursor:pointer;
}

.checkout{
width:100%;
padding:10px;
background:#ffcc00;
border:none;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
Neno Fast Food
</div>

<nav>
<a href="#menu">Menu</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Uber Eats Style Food Ordering</h1>
<p>Fast Delivery • Fresh Food • Easy Ordering</p>
</section>

<section class="menu" id="menu">

<div class="card">
<img src="images/veg-burger.jpg">
<h3>Veg Burger</h3>
<p>Fresh & tasty</p>
<div class="price">$1.00</div>
<button onclick="add('Veg Burger',1)">Add to Cart</button>
</div>

<div class="card">
<img src="images/cheese-burger.jpg">
<h3>Cheese Burger</h3>
<p>Loaded cheese</p>
<div class="price">$1.50</div>
<button onclick="add('Cheese Burger',1.5)">Add to Cart</button>
</div>

<div class="card">
<img src="images/spicy-burger.jpg">
<h3>Spicy Burger</h3>
<p>Hot & spicy</p>
<div class="price">$2.00</div>
<button onclick="add('Spicy Burger',2)">Add to Cart</button>
</div>

</section>

<div class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
</div>

<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="items"></div>
<p>Total: $<span id="total">0</span></p>
<button class="checkout" onclick="order()">Checkout</button>
</div>

<script>
let cart=[];

function add(name,price){
let item=cart.find(i=>i.name===name);
if(item){item.qty++}
else{cart.push({name,price,qty:1})}
update()
}

function update(){
let items=document.getElementById("items");
items.innerHTML="";
let total=0;
let count=0;

cart.forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;

items.innerHTML+=`
<div class="item">
<span>${i.name} x ${i.qty}</span>
<button onclick="removeItem('${i.name}')">x</button>
</div>`;
});

document.getElementById("total").innerText=total.toFixed(2);
document.getElementById("count").innerText=count;
}

function removeItem(name){
cart=cart.filter(i=>i.name!==name);
update();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function order(){
let msg="Order:%0A";
cart.forEach(i=>{
msg+=`${i.name} x ${i.qty}%0A`;
});
window.open("https://wa.me/919799765187?text="+msg);
}
</script>

</body>
</html>
