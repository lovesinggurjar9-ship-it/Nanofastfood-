<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neno Fast Food</title>

<link rel="icon" type="image/png" href="logo.png">

<meta name="description" content="Neno Fast Food - Fresh Burgers, Pizza, Fries, Drinks & Fast Delivery">
<meta name="keywords" content="Fast Food, Burger, Pizza, Delivery, Neno Fast Food">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
overflow-x:hidden;
}

a{text-decoration:none;color:inherit;}

/* HEADER */
header{
position:sticky;
top:0;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
border-bottom:1px solid #222;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
color:#ffcc00;
}

.logo img{height:50px;}

nav{
display:flex;
gap:15px;
flex-wrap:wrap;
}

nav a{
color:#fff;
font-weight:bold;
}

nav a:hover{
color:#ffcc00;
}

/* HERO */
.hero{
height:80vh;
background:url("images/banner.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
padding:20px;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero h1{
font-size:40px;
color:#ffcc00;
margin-bottom:10px;
}

.hero p{
font-size:18px;
margin-bottom:20px;
color:#ddd;
}

.btn{
background:#ffcc00;
color:#000;
padding:12px 25px;
border-radius:25px;
font-weight:bold;
display:inline-block;
}

/* SEARCH */
.search{
padding:20px;
text-align:center;
background:#111;
}

.search input{
width:90%;
max-width:500px;
padding:12px;
border-radius:25px;
border:none;
outline:none;
}

/* MENU */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#161616;
border-radius:12px;
overflow:hidden;
border:1px solid #2b2b2b;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#ffcc00;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
padding:10px;
}

.card p{
padding:0 10px;
color:#aaa;
font-size:14px;
}

.price{
padding:10px;
color:#ffcc00;
font-weight:bold;
}

.card button{
width:100%;
padding:10px;
border:none;
background:#ffcc00;
font-weight:bold;
cursor:pointer;
}

/* CART */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ffcc00;
color:#000;
padding:12px 18px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
z-index:999;
}

.cart{
position:fixed;
bottom:80px;
right:20px;
width:300px;
background:#111;
border:1px solid #333;
border-radius:10px;
padding:15px;
display:none;
}

footer{
text-align:center;
padding:30px;
background:#000;
border-top:1px solid #222;
margin-top:30px;
}

footer a{
color:#ffcc00;
margin:0 8px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png" alt="">
<span>Neno Fast Food</span>
</div>

<nav>
<a href="#home">Home</a>
<a href="#menu">Menu</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero" id="home">
<div class="hero-content">
<h1>Fresh & Delicious Food</h1>
<p>Burgers • Pizza • Fries • Drinks</p>
<a href="#menu" class="btn">Order Now</a>
</div>
</section>

<section class="search">
<input type="text" placeholder="Search food..." onkeyup="searchFood()" id="searchBox">
</section>

<section class="menu" id="menu">

<div class="card" data-name="burger">
<img src="images/veg-burger.jpg">
<h3>Veg Burger</h3>
<p>Tasty fresh burger</p>
<div class="price">$0.99</div>
<button onclick="add('Veg Burger',0.99)">Add</button>
</div>

<div class="card" data-name="pizza">
<img src="images/cheese-burger.jpg">
<h3>Cheese Burger</h3>
<p>Cheesy delight</p>
<div class="price">$1.49</div>
<button onclick="add('Cheese Burger',1.49)">Add</button>
</div>

</section>

<div class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
</div>

<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<p>Total: $<span id="total">0</span></p>
<button onclick="order()">Order</button>
</div>

<footer>
<p>© 2026 Neno Fast Food</p>
<p>
<a href="privacy.html">Privacy</a> |
<a href="terms.html">Terms</a> |
<a href="refund.html">Refund</a>
</p>
</footer>

<script>
let cart=[];

function add(name,price){
let item=cart.find(i=>i.name===name);
if(item){item.qty++;}
else{cart.push({name,price,qty:1});}
updateCart();
}

function updateCart(){
let cartItems=document.getElementById("cartItems");
let total=0;
let count=0;

cartItems.innerHTML="";

cart.forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;
cartItems.innerHTML+=`<p>${i.name} x ${i.qty}</p>`;
});

document.getElementById("total").innerText=total.toFixed(2);
document.getElementById("count").innerText=count;
}

function toggleCart(){
let c=document.getElementById("cart");
c.style.display=c.style.display==="block"?"none":"block";
}

function searchFood(){
let val=document.getElementById("searchBox").value.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
let name=card.innerText.toLowerCase();
card.style.display=name.includes(val)?"block":"none";
});
}

function order(){
if(cart.length==0){alert("Cart empty");return;}
let msg="Order:%0A";
cart.forEach(i=>{
msg+=`${i.name} x ${i.qty}%0A`;
});
window.open("https://wa.me/919799765187?text="+msg,"_blank");
}
</script>

</body>
</html>
