<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neno Fast Food Ultimate</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#000;
z-index:1000;
}

.logo{color:#ffcc00;font-weight:bold;font-size:20px}

.search{
padding:8px;
width:200px;
border-radius:5px;
border:none;
}

.menu-bar{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
}

.cat{
background:#222;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.cat.active{background:#ffcc00;color:#000}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:15px;
}

.card{
background:#151515;
padding:10px;
border-radius:10px;
border:1px solid #333;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.price{color:#ffcc00;font-weight:bold}

button{
background:#ffcc00;
border:none;
padding:8px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ffcc00;
color:#000;
padding:12px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.cart{
position:fixed;
right:-350px;
top:0;
width:300px;
height:100%;
background:#111;
padding:15px;
transition:0.3s;
}

.cart.open{right:0}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
border-bottom:1px solid #222;
padding-bottom:5px;
}

.item button{
width:auto;
padding:5px;
margin:0 3px;
}

.checkout{
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">Neno Fast Food</div>
<input class="search" id="search" placeholder="Search food...">
</header>

<div class="menu-bar" id="cats"></div>

<section class="menu" id="menu"></section>

<div class="cart-btn" onclick="toggleCart()">
🛒 (<span id="count">0</span>)
</div>

<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="items"></div>
<p>Total: $<span id="total">0</span></p>
<button class="checkout" onclick="order()">Checkout</button>
</div>

<script>
let products = [
{ id:1, name:"Veg Burger", price:1, cat:"Burger", image:"images/veg.jpg" },
{ id:2, name:"Cheese Burger", price:1.5, cat:"Burger", image:"images/cheese.jpg" },
{ id:3, name:"Pepper Pizza", price:2.5, cat:"Pizza", image:"images/pizza.jpg" },
{ id:4, name:"Cold Drink", price:0.8, cat:"Drinks", image:"images/drink.jpg" }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let currentCat = "All";

function init(){
renderCats();
renderMenu();
updateCart();
}

function renderCats(){
let cats = ["All", ...new Set(products.map(p=>p.cat))];
document.getElementById("cats").innerHTML =
cats.map(c=>`<div class="cat ${c==currentCat?'active':''}" onclick="setCat('${c}')">${c}</div>`).join("");
}

function setCat(c){
currentCat = c;
renderCats();
renderMenu();
}

function renderMenu(){
let menu = document.getElementById("menu");
let search = document.getElementById("search").value.toLowerCase();

menu.innerHTML = "";

products
.filter(p => currentCat=="All" || p.cat==currentCat)
.filter(p => p.name.toLowerCase().includes(search))
.forEach(p=>{
menu.innerHTML += `
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price">$${p.price}</div>
<button onclick="add(${p.id})">Add</button>
</div>
`;
});
}

document.getElementById("search").addEventListener("input",renderMenu);

function add(id){
let item = cart.find(i=>i.id==id);
if(item) item.qty++;
else {
let p = products.find(x=>x.id==id);
cart.push({...p,qty:1});
}
save();
updateCart();
}

function change(id,val){
let item = cart.find(i=>i.id==id);
item.qty += val;
if(item.qty<=0) cart = cart.filter(i=>i.id!=id);
save();
updateCart();
}

function updateCart(){
let items = document.getElementById("items");
items.innerHTML = "";
let total=0,count=0;

cart.forEach(i=>{
total += i.price*i.qty;
count += i.qty;

items.innerHTML += `
<div class="item">
<span>${i.name} x ${i.qty}</span>
<div>
<button onclick="change(${i.id},-1)">-</button>
<button onclick="change(${i.id},1)">+</button>
</div>
</div>
`;
});

document.getElementById("total").innerText = total.toFixed(2);
document.getElementById("count").innerText = count;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function order(){
if(cart.length==0){alert("Cart empty");return;}

let msg="🛒 Order:%0A";
let total=0;

cart.forEach(i=>{
msg += `${i.name} x ${i.qty} = $${i.price*i.qty}%0A`;
total += i.price*i.qty;
});

msg += "%0A💰 Total: $"+total;

window.open("https://wa.me/919799765187?text="+msg);
}

init();
</script>

</body>
</html>
